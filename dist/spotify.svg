<svg width="400" height="100" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="400" height="100">
    <style>
      .card {
        background-color: #121212;
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      .cover {
        width: 60px;
        height: 60px;
        border-radius: 6px;
        flex-shrink: 0;
      }
      .info {
        flex: 1;
        min-width: 0;
      }
      .label {
        color: #6a0dad;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .track {
        color: #ffffff;
        font-size: 15px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 2px;
      }
      .artist {
        color: #b3b3b3;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .play-btn {
        width: 40px;
        height: 40px;
        background: #1DB954;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .play-icon {
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 8px 0 8px 14px;
        border-color: transparent transparent transparent #000000;
        margin-left: 3px;
      }
    </style>
    <div xmlns="http://www.w3.org/1999/xhtml" class="card">
      <img class="cover" src="https://i.scdn.co/image/ab67616d0000b273c0bd2281ef27489f00953b22" alt="album art"/>
      <div class="info">
        <div class="label">Spotify</div>
        <div class="track">Let It Happen</div>
        <div class="artist">Tame Impala</div>
      </div>
      <div class="play-btn">
        <div class="play-icon"></div>
      </div>
    </div>
  </foreignObject>
</svg>
