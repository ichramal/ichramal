name: Spotify Now Playing
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  spotify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run spotify script
        run: bash .github/scripts/spotify.sh
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
      - name: Commit and push
        run: |
          git config user.name "ichramal"
          git config user.email "ichramal.dev@gmail.com"
          git add dist/spotify.svg
          if git diff --cached --quiet; then echo "no changes"
          else git commit -m "update spotify track" && git push; fi
